<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Byrtec MIS - Codigo de autorizacion</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #08080C, #16161D);
  color: #F4F4F7; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: #0F0F14; border: 2px solid #A78BFA;
  border-radius: 16px; padding: 32px;
  max-width: 540px; width: 100%;
  box-shadow: 0 8px 32px rgba(167,139,250,0.2);
}
.logo {
  width: 56px; height: 56px; margin: 0 auto 16px;
  background: linear-gradient(135deg, #A78BFA, #22D3EE);
  border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  font-size: 28px; font-weight: 800; color: white;
}
h1 {
  text-align: center; font-size: 22px;
  margin-bottom: 8px; color: #F4F4F7;
}
.subtitle {
  text-align: center; color: #A1A1AA;
  font-size: 14px; margin-bottom: 24px;
}
.code-box {
  background: #08080C; border: 2px dashed #22D3EE;
  border-radius: 10px; padding: 20px;
  margin: 20px 0;
  font-family: 'Consolas', 'SF Mono', monospace;
  font-size: 13px; color: #22D3EE;
  word-break: break-all; line-height: 1.5;
  max-height: 200px; overflow-y: auto;
}
.btn {
  background: #A78BFA; color: white;
  border: none; padding: 14px 24px;
  border-radius: 10px; font-size: 15px;
  font-weight: 600; cursor: pointer;
  width: 100%; margin-top: 12px;
}
.btn:hover { background: #7C3AED; }
.btn-copied { background: #4ADE80; }
.steps {
  background: rgba(167,139,250,0.08);
  border-left: 3px solid #A78BFA;
  padding: 14px 16px; border-radius: 6px;
  margin-top: 20px; font-size: 13px;
  color: #A1A1AA; line-height: 1.7;
}
.error { color: #FB7185; text-align: center; padding: 24px; }
.success-icon {
  text-align: center; font-size: 48px;
  color: #4ADE80; margin-bottom: 12px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">B</div>
  <h1 id="title">Byrtec MIS</h1>
  <div class="subtitle">Autorizacion remota Gmail</div>
  <div id="content"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
const content = document.getElementById('content');
const title = document.getElementById('title');

if (error) {
  title.textContent = 'Error de autorizacion';
  content.innerHTML = '<div class="error">'+error+'</div>'+
    '<p style="color:#A1A1AA;text-align:center;font-size:13px">'+
    'Cierra esta pestana y avisa a tu perito.</p>';
} else if (code) {
  content.innerHTML = '<div class="success-icon">&#10003;</div>'+
    '<p style="text-align:center;color:#F4F4F7;font-size:14px;margin-bottom:8px">'+
    '<b>Autorizacion completada</b></p>'+
    '<p style="text-align:center;color:#A1A1AA;font-size:12px">'+
    'Copia este codigo y enviaselo a tu perito por WhatsApp:</p>'+
    '<div class="code-box" id="codebox">'+code+'</div>'+
    '<button class="btn" id="btnCopy" onclick="copyCode()">'+
    '&#128203; Copiar codigo</button>'+
    '<button class="btn" style="background:#0E7490;margin-top:8px" '+
    'onclick="shareWA()">&#128172; Enviar por WhatsApp</button>'+
    '<div class="steps">'+
    '<b>Pasos:</b><br>'+
    '1. Toca "Copiar codigo"<br>'+
    '2. Abre WhatsApp y pega el codigo en el chat con tu perito<br>'+
    '3. Tu perito lo pegara en Byrtec y listo</div>';
} else {
  title.textContent = 'Sin codigo';
  content.innerHTML = '<div class="error">No se recibio codigo de autorizacion.</div>'+
    '<p style="color:#A1A1AA;text-align:center;font-size:13px">'+
    'Pidele a tu perito que te reenvie el link.</p>';
}

function copyCode() {
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ Copiado al portapapeles';
    btn.classList.add('btn-copied');
    setTimeout(() => {
      btn.textContent = '\u{1F4CB} Copiar codigo';
      btn.classList.remove('btn-copied');
    }, 3000);
  });
}
function shareWA() {
  const text = encodeURIComponent('Codigo de autorizacion Byrtec: ' + code);
  window.location.href = 'https://wa.me/?text=' + text;
}
</script>
</body>
</html>
